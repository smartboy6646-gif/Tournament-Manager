<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
        <h1 class="text-3xl font-bold text-red-500 text-glow">ADMIN SYSTEM</h1>
        <button id="logoutBtn" class="text-gray-400 hover:text-white">Logout</button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <section class="bg-[#15151a] p-6 rounded-xl border border-gray-800">
            <h2 class="text-xl font-bold mb-4">Create Tournament</h2>
            <div class="space-y-4">
                <input type="text" id="tName" placeholder="Tournament Name" class="w-full bg-black border border-gray-700 p-3 text-white rounded">
                <select id="tSlots" class="w-full bg-black border border-gray-700 p-3 text-white rounded">
                    <option value="16">16 Slots</option>
                    <option value="32">32 Slots</option>
                    <option value="64">64 Slots</option>
                </select>
                <button id="createTourneyBtn" class="w-full bg-red-500 text-white font-bold p-3 rounded hover:bg-red-600 transition">GENERATE & OPEN SLOTS</button>
            </div>
        </section>

        <section class="bg-[#15151a] p-6 rounded-xl border border-gray-800">
            <h2 class="text-xl font-bold mb-4">Active Management</h2>
            <div id="activeTourneyInfo" class="mb-4">
                <p class="text-gray-400">Join Code: <span id="displayCode" class="text-[#39ff14] font-mono text-xl tracking-widest">---</span></p>
                <p class="text-gray-400">Slots Filled: <span id="slotCounter" class="text-white">0/0</span></p>
            </div>
            
            <button id="randomizeBtn" class="w-full bg-[#39ff14] text-black font-bold p-3 rounded glow-green mb-3">RANDOMIZE BRACKET</button>
            <button class="w-full border border-gray-600 text-white p-3 rounded">MANAGE DISCORD MATCHES</button>
        </section>
    </div>

    <div id="bracketArea" class="mt-8 hidden">
        <h2 class="text-2xl font-bold mb-4">Generated Bracket</h2>
        <div id="bracketVisual" class="flex gap-4 overflow-x-auto p-4 bg-black rounded border border-gray-800">
            </div>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
